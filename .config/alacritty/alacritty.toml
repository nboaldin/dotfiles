[env]
TERM = "xterm-256color"

[font]
size = 14.0

[font.bold]
family = "BlexMono Nerd Font"
style = "Text"

[font.normal]
family = "BlexMono Nerd Font"
style = "Light"

[font.offset]
x = 1
y = 1

[window]
option_as_alt = "Both"
startup_mode = "Fullscreen"
decorations = "Buttonless"

