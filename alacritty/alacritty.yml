  gruvbox: &gruvbox
    primary:
      background: "0x282828"
      foreground: "0xdfbf8e"
      bright_foreground: "#fbf1c7"
      dim_foreground: "#a89984"
    cursor:
      style: Block
      unfocused_hollow: true
      text: CellBackground
      cursor: CellForeground
    vi_mode_cursor:
      text: CellBackground
      cursor: CellForeground
    search:
      matches:
        foreground: "#000000"
        background: "#ffffff"
      focused_match:
        foreground: CellBackground
        background: CellForeground
      footer_bar:
        background: ""
        foreground: ""
    line_indicator:
      foreground: None
      background: None
    selection:
      # This string contains all characters that are used as separators for
      # "semantic words" in Alacritty.
      # semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"
      # When set to `true`, selected text will be copied to the primary clipboard.
      save_to_clipboard: true
      text: CellBackground
      background: CellForeground
    mouse:
     url:
      launcher:
        # This depends on your OS, on Mac it’s `open`
        program: open
      modifiers: Command
    bright:
      black: "0x928374"
      red: "0xea6962"
      green: "0xa9b665"
      yellow: "0xe3a84e"
      blue: "0x7daea3"
      magenta: "0xd3869b"
      cyan: "0x89b482"
      white: "0xdfbf8e"
