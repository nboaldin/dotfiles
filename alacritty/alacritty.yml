window:
  option_as_alt: Both

env:
  TERM: xterm-256color

font:
  size: 14.0
  offset:
    x: 1
    y: 1

  normal:
    family: BlexMono Nerd Font
    style: Light
  bold:
    family: BlexMono Nerd Font
    style: Text

