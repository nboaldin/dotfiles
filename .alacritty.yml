# Font configuration
font:
  size: 13.0
  offset:
    x: 1
    y: 1

  # Normal (roman) font face
  normal:
    family: BlexMono Nerd Font Mono
    style: Light

  # Bold font face
  bold:
    family: BlexMono Nerd Font Mono
    style: Text

  # Italic font face
  # italic:
  #   family: BlexMono Nerd Font Text
  #   style: Italic

  # Bold italic font face
  # bold_italic:
  #   family: BlexMono Nerd Font Text
  #   style: Bold Italic

