theme = "rose_pine"

[editor]
line-number = "relative"
mouse = false

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false
git-ignore = false

[editor.lsp]
display-messages = true

[keys.insert]
j = { k = "normal_mode" } 
k = { j = "normal_mode" }

